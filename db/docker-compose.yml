services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: football-data-postgres
    environment:
      POSTGRES_DB: football_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_data"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  db_postgres_data:
